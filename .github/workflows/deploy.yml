name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ssh.joules.fun
          username: campusadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: /opt/campuscontrol/deploy.sh
